name: "Bug report"
description: "Create a report to help us improve NasUX-Packages"
title: "[Bug]: "
labels: [untriaged, "bug report"]
type: 'bug'
body:
  - type: markdown
    attributes:
      value: |
        **NasUX-Packages** — powered by **NasTech AI**.

        This is the bug tracker for NasUX-Packages. Please do not report issues with
        third-party software here. Use
        [GitHub Discussions](https://github.com/nastech-ai/NasUX-Packages/discussions)
        for general questions.

        Use search to check whether your issue has already been reported and perhaps
        resolved. Provide as much information as possible.

  - type: textarea
    attributes:
      label: Problem description
      description: |
        A clear and concise description of what the problem is.
        Attach logs, screenshots, or recordings that help illustrate the issue.
        Issues without a proper description will be closed.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reproduce the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    attributes:
      label: System information
      description: |
        Provide the output of `nasux-info` (or `nasux-info` if not yet replaced),
        Android version, device model, and NasUX app version.
      render: shell
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Any other context, logs, or information relevant to the issue.
