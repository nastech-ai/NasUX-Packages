name: "Package request"
description: "Request a new package for NasUX-Packages"
title: "[Package]: "
labels: ["package request"]
body:
  - type: markdown
    attributes:
      value: |
        Run `pkg search <name>` to check whether a package is already available in the
        NasUX-Packages repository.

        Package requests are handled at low priority. There is no guarantee a package
        will be added — for example if it violates our
        [Packaging Policy](https://github.com/nastech-ai/NasUX-Packages/blob/master/CONTRIBUTING.md#packaging-policy)
        or has no practical use on Android.

  - type: textarea
    attributes:
      label: Why should this package be added?
      description: |
        Explain how you plan to use this package on NasUX and why it would benefit
        the NasUX-Packages community.
    validations:
      required: true

  - type: input
    attributes:
      label: Home page URL

  - type: input
    attributes:
      label: Source code URL
      placeholder: Link to Git repository or source archive
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Packaging policy acknowledgement
      description: |
        Please read our
        [Packaging Policy](https://github.com/nastech-ai/NasUX-Packages/blob/master/CONTRIBUTING.md#packaging-policy)
        before submitting.
      options:
        - label: The project is actively maintained.
          required: false
        - label: The project has existing packages on other distributions.
          required: false
        - label: Licensed under an open source license.
          required: true
        - label: Not available through a language package manager (cargo, pip, npm, gem, etc.).
          required: true
        - label: Does not duplicate the functionality of an existing package.
          required: false
        - label: Does not serve hacking, malware, spying, phishing, DDoS, or spamming purposes.
          required: true
        - label: I have read the NasUX-Packages Packaging Policy and understand my request may be denied.
          required: true

  - type: textarea
    attributes:
      label: Additional information
      description: |
        Build steps, patches, special device requirements (root, kernel, hardware), or
        any other relevant details.
